name: Test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'

      - name: Run tests
        run: go test ./... -v

      - name: Build binary
        run: go build -ldflags "-X main.version=ci-test" -o ollama-profiler${{ matrix.os == 'windows-latest' && '.exe' || '' }} .

      - name: Verify --version
        run: ./ollama-profiler${{ matrix.os == 'windows-latest' && '.exe' || '' }} --version

      - name: Verify --help
        run: ./ollama-profiler${{ matrix.os == 'windows-latest' && '.exe' || '' }} --help

      - name: Smoke test (invalid model, expect graceful error)
        shell: bash
        run: |
          # Should print a connection error and not crash/panic.
          # The CLI exits 0 even when all runs fail (errors are per-run, not fatal).
          # Point at a closed localhost port to make the failure deterministic.
          set +e
          output=$(./ollama-profiler${{ matrix.os == 'windows-latest' && '.exe' || '' }} --url http://127.0.0.1:1 nonexistent-model -n 1 2>&1)
          set -e
          echo "$output"
          if echo "$output" | grep -qi "panic"; then
            echo "FAIL: binary panicked"
            exit 1
          fi
          if ! echo "$output" | grep -qE "(could not connect to Ollama|Ollama is not installed)"; then
            echo "FAIL: expected connection or install error in output"
            exit 1
          fi
          echo "PASS: graceful connection error (no panic)"
